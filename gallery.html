<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | SP Driving School Pune</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .gallery-item{border-radius:var(--radius-sm);overflow:hidden;aspect-ratio:4/3;position:relative;cursor:pointer;box-shadow:var(--shadow-sm);transition:var(--trans);background:var(--off-white);border:1px solid var(--light);}
    .gallery-item:hover{transform:scale(1.02);box-shadow:var(--shadow-md);}
    .gallery-item img{width:100%;height:100%;object-fit:cover;display:block;}
    .gallery-video-item{border-radius:var(--radius-sm);overflow:hidden;aspect-ratio:4/3;position:relative;box-shadow:var(--shadow-sm);transition:var(--trans);background:var(--black);border:1px solid var(--light);}
    .gallery-video-item:hover{transform:scale(1.02);box-shadow:var(--shadow-md);}
    .gallery-video-item iframe,.gallery-video-item video{width:100%;height:100%;border:0;object-fit:cover;display:block;}
    .gp-overlay-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,transparent 100%);color:white;font-size:.78rem;font-weight:600;padding:.6rem .75rem;pointer-events:none;}
    .video-badge-corner{position:absolute;top:.5rem;left:.5rem;background:rgba(0,0,0,.75);color:white;font-size:.6rem;font-weight:800;padding:.2rem .5rem;border-radius:50px;letter-spacing:.05em;}
    .gp-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 55%);opacity:0;transition:opacity .3s;display:flex;align-items:flex-end;padding:.85rem;}
    .gallery-item:hover .gp-overlay{opacity:1;}
    .gp-overlay span{color:white;font-size:.8rem;font-weight:600;line-height:1.3;}
    .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;padding:1.5rem;}
    .lightbox.open{display:flex;}
    .lb-inner{position:relative;max-width:900px;width:100%;}
    .lb-inner img{width:100%;border-radius:var(--radius);max-height:85vh;object-fit:contain;box-shadow:0 20px 60px rgba(0,0,0,.6);}
    .lb-caption{text-align:center;color:rgba(255,255,255,.65);font-size:.88rem;margin-top:.75rem;font-weight:500;}
    .lb-close{position:absolute;top:-2.5rem;right:0;background:none;border:none;color:white;font-size:2rem;cursor:pointer;opacity:.7;transition:opacity .2s;}
    .lb-close:hover{opacity:1;}
    .lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:none;color:white;font-size:1.5rem;cursor:pointer;padding:.6rem .9rem;border-radius:10px;transition:background .2s;}
    .lb-nav:hover{background:rgba(255,255,255,.22);}
    .lb-prev{left:-3.5rem;}.lb-next{right:-3.5rem;}
    .tab-count{display:inline-flex;align-items:center;justify-content:center;background:rgba(242,101,34,.15);color:var(--orange);font-size:.65rem;font-weight:800;min-width:18px;height:18px;border-radius:50px;padding:0 .35rem;margin-left:.35rem;}
    .gallery-tab.active .tab-count{background:rgba(255,255,255,.25);color:white;}
    .admin-bar{background:var(--off-white);border:1px solid var(--light);border-radius:var(--radius-sm);padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:2rem;}
    .admin-bar p{font-size:.82rem;color:var(--grey);}
    .empty-gallery{text-align:center;padding:5rem 2rem;background:var(--off-white);border-radius:var(--radius);border:2px dashed var(--light);grid-column:1/-1;}
    .empty-gallery .eg-icon{font-size:3.5rem;margin-bottom:1rem;}
    .empty-gallery h3{font-family:var(--font-head);font-size:1.5rem;margin-bottom:.5rem;}
    .empty-gallery p{font-size:.9rem;color:var(--grey);margin-bottom:1.5rem;}
    @media(max-width:640px){.lb-prev{left:-.5rem;}.lb-next{right:-.5rem;}}
  </style>
</head>
<body>
  <div class="page-hero">
    <div class="page-hero-label">Our Gallery</div>
    <h1>Photos &amp; <span class="orange">Videos</span></h1>
    <p>Theory classes, practical sessions, ghat road training and more — real moments from SP Driving School.</p>
    <div class="breadcrumb"><a href="index.html">Home</a><span class="sep">›</span><span class="current">Gallery</span></div>
  </div>

  <section class="gallery-page">
    <div class="container">

      <div class="gallery-tabs fade-in" id="galleryTabs">
        <button class="gallery-tab active" data-tab="all">All <span class="tab-count" id="c-all">0</span></button>
        <button class="gallery-tab" data-tab="theory-2w">📚 Theory 2W <span class="tab-count" id="c-theory-2w">0</span></button>
        <button class="gallery-tab" data-tab="theory-4w">📚 Theory 4W <span class="tab-count" id="c-theory-4w">0</span></button>
        <button class="gallery-tab" data-tab="prac-2w">🛵 Practical 2W <span class="tab-count" id="c-prac-2w">0</span></button>
        <button class="gallery-tab" data-tab="prac-4w">🚗 Practical 4W <span class="tab-count" id="c-prac-4w">0</span></button>
        <button class="gallery-tab" data-tab="ghat">⛰️ Ghat Road <span class="tab-count" id="c-ghat">0</span></button>
        <button class="gallery-tab" data-tab="night">🌙 Night <span class="tab-count" id="c-night">0</span></button>
        <button class="gallery-tab" data-tab="cert">🎓 Certificates <span class="tab-count" id="c-cert">0</span></button>
      </div>
      <div class="gallery-grid fade-in" id="galleryGrid" style="margin-top:1.5rem;"></div>
    </div>
  </section>

  <div class="lightbox" id="lightbox" onclick="lbBg(event)">
    <div class="lb-inner">
      <button class="lb-close" onclick="lbClose()">✕</button>
      <button class="lb-nav lb-prev" onclick="lbNav(-1)">‹</button>
      <img id="lbImg" src="" alt="" />
      <div class="lb-caption" id="lbCap"></div>
      <button class="lb-nav lb-next" onclick="lbNav(1)">›</button>
    </div>
  </div>

  <section class="cta-band">
    <h2>Want to Experience It Yourself?</h2>
    <p>Book a free trial session and see our training first-hand.</p>
    <div class="cta-buttons">
      <a href="https://wa.me/918055385572?text=Hi!%20I%20want%20to%20book%20a%20free%20trial%20lesson." class="btn-white" target="_blank">📲 Book Free Trial</a>
      <a href="courses.html" class="btn-white-outline">View All Courses →</a>
    </div>
  </section>

  <script src="components.js"></script>
  <script>
    const KEY='sp_gallery_v1';
    const CATS={'theory-2w':'📚 Theory · 2-Wheeler','theory-4w':'📚 Theory · 4-Wheeler','prac-2w':'🛵 Practical · 2-Wheeler','prac-4w':'🚗 Practical · 4-Wheeler','ghat':'⛰️ Ghat Road','night':'🌙 Night Sessions','cert':'🎓 Certificate'};
    const ALL_CATS=Object.keys(CATS);
    let all=[],curFilter='all',lbPhotos=[],lbIdx=0;
    function loadAll(){try{return JSON.parse(localStorage.getItem(KEY))||[];}catch{return[];}}
    function updateCounts(items){
      document.getElementById('c-all').textContent=items.length;
      ALL_CATS.forEach(c=>{const el=document.getElementById('c-'+c);if(el)el.textContent=items.filter(p=>p.cat===c).length;});
    }
    function renderGrid(filter){
      curFilter=filter;
      const grid=document.getElementById('galleryGrid');
      const shown=filter==='all'?all:all.filter(p=>p.cat===filter);
      lbPhotos=shown.filter(p=>p.type==='photo'||!p.type);
      grid.innerHTML='';
      if(!shown.length){grid.innerHTML='<div class="empty-gallery"><div class="eg-icon">📷</div><h3>Photos Coming Soon</h3><p>We\'re adding photos of our sessions. Check back soon!</p></div>';return;}
      let pIdx=0;
      shown.forEach((item,i)=>{
        const div=document.createElement('div');
        if(item.type==='video'){
          div.className='gallery-video-item';
          const vHTML=(item.mt==='youtube'||item.mt==='gdrive'||item.mt==='url'&&!item.src.startsWith('data:'))
            ?`<iframe src="${item.src}" frameborder="0" allowfullscreen loading="lazy"></iframe>`
            :`<video src="${item.src}" controls></video>`;
          div.innerHTML=`${vHTML}<span class="video-badge-corner">🎬 Video</span><div class="gp-overlay-label">${item.caption||CATS[item.cat]||''}</div>`;
        } else {
          const thisIdx=pIdx++;
          div.className='gallery-item';
          div.innerHTML=`<img src="${item.src}" alt="${item.caption||''}" loading="lazy" onerror="this.style.display='none'"/><div class="gp-overlay"><span>${item.caption||CATS[item.cat]||''}</span></div>`;
          div.addEventListener('click',()=>openLb(thisIdx));
        }
        div.style.opacity='0';div.style.transform='translateY(18px)';
        grid.appendChild(div);
        setTimeout(()=>{div.style.transition='opacity .4s ease,transform .4s ease';div.style.opacity='1';div.style.transform='none';},i*50);
      });
    }
    document.getElementById('galleryTabs').addEventListener('click',e=>{
      const tab=e.target.closest('.gallery-tab');if(!tab)return;
      document.querySelectorAll('.gallery-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');renderGrid(tab.dataset.tab);
    });
    function openLb(idx){lbIdx=idx;updLb();document.getElementById('lightbox').classList.add('open');document.body.style.overflow='hidden';}
    function updLb(){const p=lbPhotos[lbIdx];if(!p)return;document.getElementById('lbImg').src=p.src;document.getElementById('lbCap').textContent=[p.caption,CATS[p.cat]].filter(Boolean).join(' · ');}
    function lbNav(d){lbIdx=(lbIdx+d+lbPhotos.length)%lbPhotos.length;updLb();}
    function lbClose(){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}
    function lbBg(e){if(e.target===document.getElementById('lightbox'))lbClose();}
    document.addEventListener('keydown',e=>{if(!document.getElementById('lightbox').classList.contains('open'))return;if(e.key==='ArrowRight')lbNav(1);if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='Escape')lbClose();});
    all=loadAll();updateCounts(all);renderGrid('all');
    window.addEventListener('focus',()=>{all=loadAll();updateCounts(all);renderGrid(curFilter);});
  </script>
</body>
</html>
